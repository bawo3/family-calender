<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- iOS PWA 지원 — 홈 화면에 추가하면 standalone 모드로 실행되어 알림 사용 가능 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>캘린더</title>
<link rel="stylesheet" href="common/calendar.css">
</head>
<body>
<script>
  // URL 파라미터(?id=...) → KV(/api/calendars)에서 메타 로드 → CAL_CONFIG 설정 → calendar.js 동적 로드
  const CAL_ID = new URLSearchParams(window.location.search).get('id') || 'default';

  (async function bootCalendar(){
    let info = { name:'캘린더', emoji:'📅', color:'#5588ff' };
    // 캐시(localStorage) 우선 적용 — 빠른 첫 페인트
    try {
      const cached = localStorage.getItem('admin_calendars');
      if (cached) {
        const found = JSON.parse(cached).find(c => c.id === CAL_ID);
        if (found) info = found;
      }
    } catch(e){}
    // KV에서 최신값 가져와서 갱신
    try {
      const dyn = await fetch('/api/calendars').then(r => r.ok ? r.json() : []);
      const found = (Array.isArray(dyn) ? dyn : []).find(c => c.id === CAL_ID);
      if (found) info = found;
    } catch(e) { console.error('캘린더 메타 로드 실패, 캐시/기본값 사용:', e); }

    window.CAL_CONFIG = {
      prefix: `cal_${CAL_ID}`,
      title:  `${info.emoji} ${info.name}`,
      accent: info.color
    };
    document.title = info.name;

    // 메타 로드 후 메인 스크립트 동적 주입
    const s = document.createElement('script');
    s.src = 'common/calendar.js';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
