<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더</title>
<link rel="stylesheet" href="common/calendar.css">
</head>
<body>
<script>
  // URL 파라미터(?id=...)로 캘린더 ID 결정 → admin_calendars 에서 정보 로드
  const CAL_ID = new URLSearchParams(window.location.search).get('id') || 'default';
  const adminRaw = localStorage.getItem('admin_calendars');
  const cals = adminRaw ? JSON.parse(adminRaw) : [];
  const info = cals.find(c => c.id === CAL_ID) || { name:'캘린더', emoji:'📅', color:'#5588ff' };

  // 공통 로직에 전달할 설정
  window.CAL_CONFIG = {
    prefix: `cal_${CAL_ID}`,
    title:  `${info.emoji} ${info.name}`,
    accent: info.color
  };
  // 브라우저 탭 제목도 동적으로 변경
  document.title = info.name;
</script>
<script src="common/calendar.js"></script>
</body>
</html>
