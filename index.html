<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더 홈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    font-size: 26px;
    color: #2c3e50;
    margin-bottom: 8px;
    text-align: center;
  }
  .sub {
    color: #7f8c8d;
    font-size: 14px;
    margin-bottom: 40px;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    width: 240px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
    border-top: 5px solid transparent;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.14);
  }
  .card.family { border-top-color: #3498db; }
  .card.hyeju  { border-top-color: #e84393; }
  .card .emoji { font-size: 52px; margin-bottom: 16px; }
  .card h2 { font-size: 18px; color: #2c3e50; margin-bottom: 8px; }
  .card p  { font-size: 13px; color: #7f8c8d; line-height: 1.5; }
  .card .go-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
  }
  .card.family .go-btn { background: #3498db; }
  .card.hyeju  .go-btn { background: #e84393; }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #bdc3c7;
  }
</style>
</head>
<body>

<h1>📅 캘린더 일정표</h1>
<p class="sub">사용할 캘린더를 선택하세요</p>

<div class="cards">
  <a class="card family" href="kim-family.html">
    <div class="emoji">👨‍👩‍👧‍👦</div>
    <h2>가족 캘린더</h2>
    <p>김씨 가족 공용 일정 관리</p>
    <span class="go-btn">열기 →</span>
  </a>

  <a class="card hyeju" href="jhkim-hyeju.html">
    <div class="emoji">💑</div>
    <h2>재현혜주네</h2>
    <p>재현 &amp; 혜주 일정 관리</p>
    <span class="go-btn">열기 →</span>
  </a>
</div>

<footer>데이터는 각 캘린더별로 브라우저 로컬스토리지에 따로 저장됩니다</footer>

</body>
</html>
