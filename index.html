<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더 관리자</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 30px 16px;
    color: #eee;
  }

  /* ===== 공통 카드 ===== */
  .card {
    background: #16213e;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    padding: 32px;
    width: 100%;
    max-width: 420px;
  }

  /* ===== 패스워드 입력 화면 ===== */
  #pwScreen h1 {
    font-size: 22px;
    text-align: center;
    margin-bottom: 6px;
    color: #fff;
  }
  #pwScreen p {
    text-align: center;
    font-size: 13px;
    color: #8888aa;
    margin-bottom: 24px;
  }
  .field-label {
    font-size: 13px;
    font-weight: bold;
    color: #aaaacc;
    margin-bottom: 6px;
    display: block;
  }
  .field-input {
    width: 100%;
    padding: 11px 14px;
    background: #0f0f1a;
    border: 1px solid #2e2e4e;
    border-radius: 8px;
    color: #eee;
    font-size: 15px;
    letter-spacing: 4px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: #5588ff; }
  .field-input.normal { letter-spacing: normal; }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #5588ff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #3366cc; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    text-align: center;
    margin-top: -10px;
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* ===== 관리자 대시보드 ===== */
  #dashboard { max-width: 860px; width: 100%; }
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .dash-header h1 { font-size: 24px; color: #fff; }
  .dash-header-actions { display: flex; gap: 10px; }
  .btn-ghost {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid #2e2e4e;
    border-radius: 8px;
    color: #aaaacc;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: #5588ff; color: #5588ff; }
  .btn-danger-ghost {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid #2e2e4e;
    border-radius: 8px;
    color: #ff8888;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-danger-ghost:hover { border-color: #ff4444; }

  /* 캘린더 카드 그리드 */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .cal-card {
    background: #16213e;
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border-top: 5px solid #5588ff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    cursor: pointer;
  }
  .cal-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .cal-card .emoji { font-size: 48px; }
  .cal-card .cal-name { font-size: 16px; font-weight: bold; color: #fff; }
  .cal-card .cal-desc { font-size: 12px; color: #8888aa; }
  .cal-card .open-btn {
    margin-top: 8px;
    padding: 6px 18px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    border: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  /* 삭제 버튼 (카드 우측 상단) */
  .cal-card .del-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8888;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }
  .cal-card .del-btn:hover { background: rgba(255,80,80,0.3); }
  /* 내장 캘린더(기본 2개)는 삭제 불가 표시 없음 */
  .cal-card.builtin .del-btn { display: none; }

  /* 캘린더 추가 카드 버튼 */
  .add-cal-card {
    background: #0f0f1a;
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 2px dashed #2e2e4e;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    min-height: 190px;
  }
  .add-cal-card:hover { border-color: #5588ff; background: #16213e; }
  .add-cal-card .plus { font-size: 36px; color: #5588ff; }
  .add-cal-card span { font-size: 14px; color: #8888aa; }

  /* ===== 모달 공통 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: #16213e;
    border-radius: 14px;
    padding: 30px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .modal h2 { font-size: 18px; color: #fff; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 10px;
    background: #0f0f1a; border: 1px solid #2e2e4e;
    border-radius: 8px; color: #aaa; font-size: 14px;
    cursor: pointer;
  }
  .btn-cancel:hover { border-color: #5588ff; }
  .btn-confirm {
    flex: 2; padding: 10px;
    background: #5588ff; border: none;
    border-radius: 8px; color: #fff; font-size: 14px;
    font-weight: bold; cursor: pointer;
  }
  .btn-confirm:hover { background: #3366cc; }
  .btn-confirm:disabled { background: #333; color: #666; cursor: not-allowed; }

  /* 색상 팔레트 (캘린더 추가 모달) */
  .theme-palette {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-top: 6px;
    margin-bottom: 4px;
  }
  .theme-swatch {
    aspect-ratio: 1;
    border-radius: 8px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .theme-swatch:hover { transform: scale(1.1); }
  .theme-swatch.active { border-color: #fff; transform: scale(1.1); }

  /* 이모지 입력 */
  .emoji-input {
    width: 72px;
    font-size: 28px;
    text-align: center;
    padding: 6px;
    background: #0f0f1a;
    border: 1px solid #2e2e4e;
    border-radius: 8px;
    color: #fff;
    outline: none;
  }
  .emoji-input:focus { border-color: #5588ff; }

  /* ===== 사용자 관리 모달 ===== */
  .user-list { margin-top: 4px; max-height: 320px; overflow-y: auto; }
  .user-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px; border-bottom: 1px solid #1e2a4a;
  }
  .user-row:last-child { border-bottom: none; }
  .user-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .user-name { flex: 1; font-size: 14px; color: #eee; }
  .user-del-btn {
    background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.35);
    color: #ff8888; border-radius: 6px; padding: 3px 10px;
    font-size: 12px; cursor: pointer; transition: background 0.15s;
  }
  .user-del-btn:hover { background: rgba(255,80,80,0.35); }
  .user-empty { color: #666; font-size: 13px; text-align: center; padding: 20px 0; }
  /* 사용자 관리 버튼 */
  .cal-card .manage-btn {
    position: absolute; top: 10px; left: 10px;
    background: rgba(85,136,255,0.15); border: 1px solid rgba(85,136,255,0.35);
    color: #88aaff; border-radius: 50%; width: 26px; height: 26px;
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .cal-card .manage-btn:hover { background: rgba(85,136,255,0.35); }

  /* ===== 반응형 ===== */
  @media (max-width: 480px) {
    body { padding: 16px; }
    .card { padding: 24px 18px; }
    .dash-header h1 { font-size: 20px; }
    .modal { padding: 22px 16px; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ===== 패스워드 입력 화면 ===== -->
<div class="card" id="pwScreen">
  <h1>🔐 캘린더 관리자</h1>
  <p>관리자 패스워드를 입력하세요</p>
  <label class="field-label" for="pwInput">패스워드</label>
  <input class="field-input" type="password" id="pwInput" placeholder="••••••" maxlength="30" autocomplete="off">
  <div class="error-msg" id="pwError"></div>
  <button class="btn-primary" id="pwLoginBtn">로그인</button>
</div>

<!-- ===== 관리자 대시보드 ===== -->
<div id="dashboard" class="hidden">
  <div class="dash-header">
    <h1>📅 캘린더 관리자</h1>
    <div class="dash-header-actions">
      <button class="btn-ghost" id="changePwBtn">🔑 패스워드 변경</button>
      <button class="btn-danger-ghost" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- ===== 모달: 사용자 관리 ===== -->
<div class="modal-overlay hidden" id="userModal">
  <div class="modal">
    <h2 id="userModalTitle">👥 사용자 관리</h2>
    <div class="user-list" id="userList"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="userModalClose">닫기</button>
    </div>
  </div>
</div>

<!-- ===== 모달: 캘린더 추가 ===== -->
<div class="modal-overlay hidden" id="addModal">
  <div class="modal">
    <h2>📅 캘린더 추가</h2>

    <label class="field-label">캘린더 이름</label>
    <input class="field-input normal" type="text" id="newCalName" placeholder="예: 친구들" maxlength="20">

    <label class="field-label">이모지</label>
    <input class="emoji-input" type="text" id="newCalEmoji" value="📅" maxlength="2">

    <label class="field-label" style="margin-top:14px;">테마 색상</label>
    <div class="theme-palette" id="themePalette"></div>

    <div class="modal-footer">
      <button class="btn-cancel" id="addModalCancel">취소</button>
      <button class="btn-confirm" id="addModalConfirm">추가</button>
    </div>
  </div>
</div>

<!-- ===== 모달: 패스워드 변경 ===== -->
<div class="modal-overlay hidden" id="changePwModal">
  <div class="modal">
    <h2>🔑 패스워드 변경</h2>
    <label class="field-label">새 패스워드</label>
    <input class="field-input" type="password" id="newPw1" placeholder="새 패스워드 입력" maxlength="30" autocomplete="new-password">
    <label class="field-label">새 패스워드 확인</label>
    <input class="field-input" type="password" id="newPw2" placeholder="다시 입력" maxlength="30" autocomplete="new-password">
    <div class="error-msg" id="changePwError"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="changePwCancel">취소</button>
      <button class="btn-confirm" id="changePwConfirm">변경</button>
    </div>
  </div>
</div>

<script>
  // ===== API 베이스 =====
  const API = '/api';

  // ===== 캘린더별 prefix 반환 =====
  function calPrefix(cal) {
    if (cal.id === 'builtin_family') return 'family';
    if (cal.id === 'builtin_hyeju') return 'hyeju';
    return 'cal_' + cal.id; // 동적 캘린더
  }

  // ===== localStorage 키 =====
  const KEY_ADMIN_PW  = 'admin_password';    // 관리자 패스워드
  const KEY_CALENDARS = 'admin_calendars';   // 캘린더 목록

  // ===== 테마 색상 12가지 =====
  const THEME_COLORS = [
    '#e74c3c', '#e67e22', '#f1c40f', '#27ae60',
    '#1abc9c', '#3498db', '#5588ff', '#9b59b6',
    '#e84393', '#34495e', '#00b894', '#fd79a8'
  ];

  // ===== 기본 내장 캘린더 2개 (kim-family.html, jhkim-hyeju.html) =====
  const BUILTIN_CALENDARS = [
    { id: 'builtin_family', name: '가족 캘린더',  emoji: '👨‍👩‍👧‍👦', color: '#3498db', file: 'kim-family.html',  builtin: true },
    { id: 'builtin_hyeju',  name: 'JHJ쀼♥',   emoji: '👩‍❤️‍👨',      color: '#e84393', file: 'jhkim-hyeju.html', builtin: true }
  ];

  // ===== 관리자 세션 (탭 닫으면 자동 로그아웃) =====
  let isLoggedIn = sessionStorage.getItem('admin_logged') === '1';

  // ===== 패스워드 로드/저장 =====
  function loadPassword() {
    return localStorage.getItem(KEY_ADMIN_PW) || '681100';
  }
  function savePassword(pw) {
    localStorage.setItem(KEY_ADMIN_PW, pw);
  }

  // ===== 캘린더 목록 로드/저장 — KV(서버) 공유 =====
  // 동적 캘린더는 /api/calendars 에 저장 → 모든 기기/사용자가 동일 목록 사용
  // 빌트인 캘린더는 코드에 하드코딩되어 있으므로 항상 앞에 표시
  async function loadCalendars() {
    try {
      const dynamic = await fetch('/api/calendars').then(r => r.ok ? r.json() : []);
      const dynList = Array.isArray(dynamic) ? dynamic.map(c => ({...c, builtin: false})) : [];
      const merged = [...BUILTIN_CALENDARS, ...dynList];
      // 오프라인 폴백용으로 캐싱
      localStorage.setItem(KEY_CALENDARS, JSON.stringify(merged));
      return merged;
    } catch(e) {
      console.error('캘린더 목록 로드 실패 → localStorage 폴백:', e);
      const raw = localStorage.getItem(KEY_CALENDARS);
      return raw ? JSON.parse(raw) : [...BUILTIN_CALENDARS];
    }
  }
  // 동적 캘린더만 서버에 저장 (빌트인 제외)
  async function saveCalendars(fullList) {
    localStorage.setItem(KEY_CALENDARS, JSON.stringify(fullList)); // 캐시
    const dynamic = fullList.filter(c => !c.builtin)
      .map(({id,name,emoji,color,file}) => ({id,name,emoji,color,file}));
    await fetch('/api/calendars', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(dynamic)
    });
  }

  // ===== 패스워드 화면 =====
  function tryLogin() {
    const input = document.getElementById('pwInput').value;
    if (input === loadPassword()) {
      sessionStorage.setItem('admin_logged', '1');
      isLoggedIn = true;
      document.getElementById('pwScreen').classList.add('hidden');
      document.getElementById('pwInput').value = '';
      showDashboard();
    } else {
      document.getElementById('pwError').textContent = '패스워드가 올바르지 않습니다.';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }
  document.getElementById('pwLoginBtn').addEventListener('click', tryLogin);
  document.getElementById('pwInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') tryLogin();
  });
  document.getElementById('pwInput').addEventListener('input', () => {
    document.getElementById('pwError').textContent = '';
  });

  // ===== 로그아웃 =====
  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('admin_logged');
    isLoggedIn = false;
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('pwScreen').classList.remove('hidden');
    document.getElementById('pwInput').focus();
  });

  // ===== 대시보드 렌더링 =====
  function showDashboard() {
    document.getElementById('dashboard').classList.remove('hidden');
    renderCalendars();
  }

  async function renderCalendars() {
    const list = await loadCalendars();
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    list.forEach(cal => {
      const card = document.createElement('div');
      card.className = 'cal-card' + (cal.builtin ? ' builtin' : '');
      card.style.borderTopColor = cal.color;

      // 사용자 관리 버튼 (좌측 상단)
      const manageBtn = document.createElement('button');
      manageBtn.className = 'manage-btn';
      manageBtn.title = '사용자 관리';
      manageBtn.textContent = '👥';
      manageBtn.addEventListener('click', e => {
        e.stopPropagation();
        openUserModal(cal);
      });
      card.appendChild(manageBtn);

      // 삭제 버튼 (내장 캘린더 제외)
      if (!cal.builtin) {
        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.title = '캘린더 삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          deleteCalendar(cal.id);
        });
        card.appendChild(delBtn);
      }

      const emoji = document.createElement('div');
      emoji.className = 'emoji';
      emoji.textContent = cal.emoji;

      const name = document.createElement('div');
      name.className = 'cal-name';
      name.textContent = cal.name;

      const desc = document.createElement('div');
      desc.className = 'cal-desc';
      desc.textContent = cal.builtin ? '기본 캘린더' : '사용자 추가 캘린더';

      const openBtn = document.createElement('a');
      openBtn.className = 'open-btn';
      openBtn.href = cal.file;
      openBtn.textContent = '열기 →';
      openBtn.style.background = cal.color;

      card.appendChild(emoji);
      card.appendChild(name);
      card.appendChild(desc);
      card.appendChild(openBtn);
      grid.appendChild(card);
    });

    // 캘린더 추가 카드
    const addCard = document.createElement('div');
    addCard.className = 'add-cal-card';
    addCard.innerHTML = '<div class="plus">＋</div><span>캘린더 추가</span>';
    addCard.addEventListener('click', openAddModal);
    grid.appendChild(addCard);
  }

  // ===== 캘린더 삭제 =====
  async function deleteCalendar(id) {
    if (!confirm('이 캘린더를 목록에서 삭제하시겠습니까?\n(저장된 일정 데이터는 KV에 남아 있습니다)')) return;
    const list = (await loadCalendars()).filter(c => c.id !== id);
    await saveCalendars(list);
    await renderCalendars();
  }

  // ===== 캘린더 추가 모달 =====
  let pickedColor = THEME_COLORS[5]; // 기본값: 파란색

  function renderThemePalette() {
    const palette = document.getElementById('themePalette');
    palette.innerHTML = '';
    THEME_COLORS.forEach(color => {
      const sw = document.createElement('div');
      sw.className = 'theme-swatch' + (color === pickedColor ? ' active' : '');
      sw.style.background = color;
      sw.addEventListener('click', () => {
        pickedColor = color;
        document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('active', s.style.background === color || s.style.backgroundColor === color));
      });
      palette.appendChild(sw);
    });
  }

  function openAddModal() {
    pickedColor = THEME_COLORS[5];
    document.getElementById('newCalName').value = '';
    document.getElementById('newCalEmoji').value = '📅';
    renderThemePalette();
    document.getElementById('addModal').classList.remove('hidden');
    document.getElementById('newCalName').focus();
  }

  document.getElementById('addModalCancel').addEventListener('click', () => {
    document.getElementById('addModal').classList.add('hidden');
  });

  document.getElementById('addModalConfirm').addEventListener('click', async () => {
    const name  = document.getElementById('newCalName').value.trim();
    const emoji = document.getElementById('newCalEmoji').value.trim() || '📅';
    if (!name) { document.getElementById('newCalName').focus(); return; }

    // 고유 ID 생성 (시간 기반)
    const id   = 'cal_' + Date.now().toString(36);
    // 새 캘린더는 calendar.html?id=XXX 로 열림
    const file = `calendar.html?id=${id}`;

    const btn = document.getElementById('addModalConfirm');
    btn.disabled = true; btn.textContent = '저장 중...';
    try {
      const list = await loadCalendars();
      list.push({ id, name, emoji, color: pickedColor, file, builtin: false });
      await saveCalendars(list);
      document.getElementById('addModal').classList.add('hidden');
      await renderCalendars();
    } catch(e) {
      alert('서버 저장 실패: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = '추가';
    }
  });

  // 모달 배경 클릭 시 닫기
  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === document.getElementById('addModal')) document.getElementById('addModal').classList.add('hidden');
  });

  // ===== 패스워드 변경 모달 =====
  document.getElementById('changePwBtn').addEventListener('click', () => {
    document.getElementById('newPw1').value = '';
    document.getElementById('newPw2').value = '';
    document.getElementById('changePwError').textContent = '';
    document.getElementById('changePwModal').classList.remove('hidden');
    document.getElementById('newPw1').focus();
  });

  document.getElementById('changePwCancel').addEventListener('click', () => {
    document.getElementById('changePwModal').classList.add('hidden');
  });

  document.getElementById('changePwConfirm').addEventListener('click', confirmChangePassword);
  document.getElementById('newPw2').addEventListener('keypress', e => {
    if (e.key === 'Enter') confirmChangePassword();
  });

  function confirmChangePassword() {
    const pw1 = document.getElementById('newPw1').value;
    const pw2 = document.getElementById('newPw2').value;
    if (!pw1) {
      document.getElementById('changePwError').textContent = '새 패스워드를 입력하세요.';
      return;
    }
    if (pw1 !== pw2) {
      document.getElementById('changePwError').textContent = '패스워드가 일치하지 않습니다.';
      return;
    }
    savePassword(pw1);
    document.getElementById('changePwModal').classList.add('hidden');
    alert('패스워드가 변경되었습니다.');
  }

  document.getElementById('changePwModal').addEventListener('click', e => {
    if (e.target === document.getElementById('changePwModal')) document.getElementById('changePwModal').classList.add('hidden');
  });

  // ===== 사용자 관리 모달 =====
  let currentUserModalCal = null;

  async function openUserModal(cal) {
    currentUserModalCal = cal;
    document.getElementById('userModalTitle').textContent = `👥 ${cal.name} 사용자 관리`;
    document.getElementById('userList').innerHTML = '<div class="user-empty">불러오는 중...</div>';
    document.getElementById('userModal').classList.remove('hidden');
    await renderUserList(cal);
  }

  async function renderUserList(cal) {
    const prefix = calPrefix(cal);
    const listEl = document.getElementById('userList');
    try {
      const res = await fetch(`${API}/users?prefix=${encodeURIComponent(prefix)}`);
      const users = await res.json();
      const names = Object.keys(users);
      if (!names.length) {
        listEl.innerHTML = '<div class="user-empty">등록된 사용자가 없습니다.</div>';
        return;
      }
      listEl.innerHTML = '';
      names.forEach(name => {
        const u = users[name];
        const row = document.createElement('div');
        row.className = 'user-row';
        const dot = document.createElement('div');
        dot.className = 'user-dot';
        dot.style.background = u.color || '#95a5a6';
        const nameEl = document.createElement('span');
        nameEl.className = 'user-name';
        nameEl.textContent = name;
        const delBtn = document.createElement('button');
        delBtn.className = 'user-del-btn';
        delBtn.textContent = '삭제';
        delBtn.addEventListener('click', () => deleteUser(cal, name, row));
        row.appendChild(dot);
        row.appendChild(nameEl);
        row.appendChild(delBtn);
        listEl.appendChild(row);
      });
    } catch (e) {
      listEl.innerHTML = '<div class="user-empty">불러오기 실패: ' + e.message + '</div>';
    }
  }

  async function deleteUser(cal, name, rowEl) {
    if (!confirm(`"${name}" 사용자를 삭제하시겠습니까?\n이 사용자의 일정 데이터는 유지됩니다.`)) return;
    const prefix = calPrefix(cal);
    try {
      const res = await fetch(`${API}/users?prefix=${encodeURIComponent(prefix)}&name=${encodeURIComponent(name)}`, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error((await res.json()).error || '삭제 실패');
      rowEl.remove();
      if (!document.getElementById('userList').querySelector('.user-row')) {
        document.getElementById('userList').innerHTML = '<div class="user-empty">등록된 사용자가 없습니다.</div>';
      }
    } catch (e) {
      alert('삭제 실패: ' + e.message);
    }
  }

  document.getElementById('userModalClose').addEventListener('click', () => {
    document.getElementById('userModal').classList.add('hidden');
  });
  document.getElementById('userModal').addEventListener('click', e => {
    if (e.target === document.getElementById('userModal')) document.getElementById('userModal').classList.add('hidden');
  });

  // ===== 초기화 =====
  // 이미 로그인된 세션이면 바로 대시보드로
  if (isLoggedIn) {
    document.getElementById('pwScreen').classList.add('hidden');
    showDashboard();
  } else {
    document.getElementById('pwInput').focus();
  }
</script>
</body>
</html>
