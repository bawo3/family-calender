<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재현혜주네 캘린더</title>
<style>
  :root {
    --accent:#e84393; --accent-dark:#c0306e;
    --body-bg:#fdf4f8; --card-bg:#ffffff; --card-shadow:0 2px 12px rgba(232,67,147,0.08);
    --text-primary:#2c1a24; --text-secondary:#9a7085; --text-base:#3d2233;
    --border:#f0d5e5; --weekday-bg:#fce4f0; --day-bg:#fdf7fb; --day-hover:#fce4f0;
    --panel-bg:#fdf4f8; --input-bg:#ffffff; --item-bg:#ffffff;
    --chip-bg:#fdf4f8; --chip-hover:#fce4f0;
    --help-border:#e84393; --time-badge-bg:#fce4f0; --time-badge-text:#9a3060;
    --range-badge-bg:#fef9e7; --range-badge-text:#b9770e;
    --empty-msg:#c0a0b0; --skin-btn-border:#f0d5e5;
  }
  body.dark {
    --accent:#ff6eb0; --accent-dark:#cc4080;
    --body-bg:#1a0f14; --card-bg:#2a1520; --card-shadow:0 2px 16px rgba(0,0,0,0.5);
    --text-primary:#f0d0e0; --text-secondary:#aa8898; --text-base:#ddbbc8;
    --border:#4e2e3e; --weekday-bg:#200f18; --day-bg:#221018; --day-hover:#301825;
    --panel-bg:#200f18; --input-bg:#301825; --item-bg:#301825;
    --chip-bg:#301825; --chip-hover:#3e2030;
    --help-border:#ff6eb0; --time-badge-bg:#3e2030; --time-badge-text:#cc88aa;
    --range-badge-bg:#2a240a; --range-badge-text:#f0c060;
    --empty-msg:#885068; --skin-btn-border:#4e2e3e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--body-bg);color:var(--text-base);padding:20px;user-select:none;transition:background 0.3s,color 0.3s;}
  .container{max-width:900px;margin:0 auto;background:var(--card-bg);border-radius:12px;box-shadow:var(--card-shadow);padding:24px;transition:background 0.3s;}

  /* 로그인 */
  .login-box{max-width:480px;margin:20px auto;background:var(--card-bg);border-radius:12px;box-shadow:var(--card-shadow);padding:32px;transition:background 0.3s;}
  .login-box h1{font-size:22px;color:var(--text-primary);margin-bottom:4px;text-align:center;}
  .login-box>p{color:var(--text-secondary);font-size:13px;margin-bottom:20px;text-align:center;}
  .login-box label{display:block;font-size:13px;font-weight:bold;color:var(--text-primary);margin:14px 0 6px;}
  .login-box input[type="text"]{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--input-bg);color:var(--text-base);transition:background 0.3s,border-color 0.3s;}
  .skin-toggle{display:flex;gap:8px;margin-top:6px;}
  .skin-btn{flex:1;padding:10px;border:2px solid var(--skin-btn-border);border-radius:8px;background:var(--chip-bg);color:var(--text-base);cursor:pointer;font-size:14px;text-align:center;transition:border-color 0.2s,background 0.2s;}
  .skin-btn:hover{border-color:var(--accent);}
  .skin-btn.active{border-color:var(--accent);background:var(--day-hover);font-weight:bold;color:var(--text-primary);}
  .color-palette{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px;}
  .color-cell{aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
  .color-cell:hover{transform:scale(1.1);}
  .color-cell.active{border-color:var(--text-primary);transform:scale(1.1);box-shadow:0 0 0 2px var(--card-bg) inset;}
  .selected-color-info{margin-top:10px;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;}
  .selected-color-swatch{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);}
  .login-btn{width:100%;margin-top:20px;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:6px;cursor:pointer;font-size:15px;font-weight:bold;transition:background 0.2s;}
  .login-btn:hover{background:var(--accent-dark);}
  .login-btn:disabled{background:#888;cursor:not-allowed;}
  .saved-user-chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip-bg);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text-base);transition:background 0.15s;}
  .saved-user-chip:hover{background:var(--chip-hover);}
  .saved-user-chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .saved-user-chip .skin-icon{font-size:11px;opacity:0.7;}
  .saved-user-chip.other-cal{border-style:dashed;opacity:0.82;}
  .quick-login{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .quick-login h3{font-size:13px;color:var(--text-secondary);margin-bottom:8px;}
  .quick-login-list{display:flex;flex-wrap:wrap;gap:6px;}
  .quick-login-label{font-size:11px;color:var(--text-secondary);width:100%;margin:4px 0 2px;}
  .quick-login-divider{width:100%;height:1px;background:var(--border);margin:6px 0 2px;}

  /* 캘린더 상단 */
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .top-bar h1{font-size:22px;color:var(--text-primary);}
  .top-bar button{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;}
  .top-bar button:hover{background:var(--accent-dark);}
  .nav{display:flex;gap:8px;align-items:center;}
  .nav .month-label{font-size:18px;font-weight:bold;min-width:130px;text-align:center;color:var(--text-primary);}
  .user-info{display:flex;align-items:center;gap:8px;background:var(--panel-bg);padding:6px 12px;border-radius:20px;font-size:13px;border:1px solid var(--border);}
  .user-info .user-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(128,128,128,0.3);flex-shrink:0;}
  .user-info .skin-switch-btn{background:var(--chip-bg);color:var(--text-base);border:1px solid var(--border);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:12px;}
  .user-info .skin-switch-btn:hover{background:var(--chip-hover);}
  .user-info .logout-btn{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;}
  .user-info .logout-btn:hover{background:#c0392b;}
  .help-msg{font-size:12px;color:var(--text-secondary);margin-bottom:10px;padding:8px 10px;background:var(--panel-bg);border-radius:6px;border:1px solid var(--border);border-left:3px solid var(--help-border);}

  /* 매우중요 배너 */
  .important-banner{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border-radius:8px;padding:10px 16px;margin-bottom:12px;}
  .important-banner .b-title{font-size:13px;font-weight:bold;margin-bottom:6px;}
  .important-banner .b-item{font-size:12px;padding:4px 0;border-top:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .b-user-badge{background:rgba(255,255,255,0.25);border-radius:8px;padding:1px 7px;font-size:11px;white-space:nowrap;}
  .b-range{opacity:0.8;font-size:11px;}
  .b-section-title{font-size:11px;font-weight:bold;color:rgba(255,255,255,0.9);margin:4px 0 3px;letter-spacing:0.3px;}
  .b-section-gap{margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.25);}
  .b-item.in-progress{background:rgba(46,204,113,0.88);border-radius:5px;padding:4px 8px;margin:2px -4px;border-top:none;}

  /* 요일/날짜 그리드 */
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--weekday-bg);border-radius:6px;overflow:hidden;}
  .weekdays div{padding:10px;text-align:center;font-weight:bold;font-size:14px;color:var(--text-primary);}
  .weekdays .sun{color:#e74c3c;} .weekdays .sat{color:#3498db;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px;}
  .day{min-height:100px;background:var(--day-bg);border-radius:6px;padding:6px;cursor:pointer;transition:background 0.15s;border:1px solid transparent;overflow:hidden;}
  .day:hover{background:var(--day-hover);}
  .day.empty{background:transparent;cursor:default;}
  .day.today{border-color:var(--accent);}
  .day.selected{background:var(--day-hover);border-color:var(--accent-dark);}
  .day.range{background:rgba(232,67,147,0.10);border-color:rgba(232,67,147,0.35);}
  .day.range-edge{background:rgba(232,67,147,0.24);border-color:var(--accent);}
  .day .date-num{font-size:14px;font-weight:bold;margin-bottom:4px;color:var(--text-primary);}
  .day.sun .date-num{color:#e74c3c;} .day.sat .date-num{color:#3498db;}

  /* 이벤트 바 */
  .event-bar{color:#fff;font-size:11px;height:18px;line-height:18px;margin-top:2px;padding:0 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .event-bar.bar-start{border-radius:4px 0 0 4px;margin-left:-6px;margin-right:-6px;padding-left:8px;}
  .event-bar.bar-mid{border-radius:0;margin-left:-6px;margin-right:-6px;padding:0;}
  .event-bar.bar-end{border-radius:0 4px 4px 0;margin-left:-6px;margin-right:-6px;padding:0;}
  .event-bar.bar-span{border-radius:4px;margin-left:-6px;margin-right:-6px;padding:0 8px;}

  /* 일정 패널 */
  .event-panel{margin-top:20px;padding:16px;background:var(--panel-bg);border-radius:8px;border:1px solid var(--border);}
  .event-panel h2{font-size:16px;margin-bottom:4px;color:var(--text-primary);}
  .range-info{font-size:12px;color:var(--text-secondary);margin-bottom:10px;}
  .event-form{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .event-form input[type="text"]{flex:1;min-width:180px;padding:8px;border:1px solid var(--border);border-radius:4px;font-size:14px;background:var(--input-bg);color:var(--text-base);}
  .event-form input[type="time"]{padding:7px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:var(--input-bg);color:var(--text-base);}
  .event-form .time-label{font-size:12px;color:var(--text-secondary);}
  .event-form button{background:#27ae60;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;}
  .event-form button:hover{background:#1e8449;}
  .important-check{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-base);cursor:pointer;user-select:none;}
  .important-check input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:#e74c3c;}
  .important-check input[type="checkbox"]:disabled{cursor:not-allowed;opacity:0.5;}
  .event-time,.event-range{display:inline-block;font-size:11px;padding:1px 6px;border-radius:3px;margin-right:4px;}
  .event-time{background:var(--time-badge-bg);color:var(--time-badge-text);}
  .event-range{background:var(--range-badge-bg);color:var(--range-badge-text);}
  .event-list{list-style:none;}
  .event-list li{background:var(--item-bg);padding:10px;margin-bottom:6px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--accent);flex-wrap:wrap;gap:6px;}
  .event-content{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
  .event-user{font-size:12px;font-weight:bold;color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .event-text{font-size:14px;color:var(--text-base);}
  .event-important-badge{font-size:11px;background:#e74c3c;color:#fff;border-radius:3px;padding:1px 5px;}
  .delete-btn{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:12px;}
  .delete-btn:hover{background:#c0392b;}
  .empty-msg{color:var(--empty-msg);font-size:14px;padding:8px;}
  .hidden{display:none !important;}

  /* 공지사항 모달 */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal-box{background:var(--card-bg);border-radius:12px;padding:24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
  .modal-box h2{font-size:18px;color:var(--text-primary);margin-bottom:14px;}
  .modal-box textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--input-bg);color:var(--text-base);resize:vertical;min-height:80px;font-family:inherit;transition:background 0.3s;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
  .modal-btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;}
  .modal-btn.primary{background:var(--accent);color:#fff;}
  .modal-btn.primary:hover{background:var(--accent-dark);}
  .modal-btn.cancel{background:var(--chip-bg);color:var(--text-base);border:1px solid var(--border);}
  .modal-btn.cancel:hover{background:var(--chip-hover);}
  .notice-list-section{margin-top:16px;border-top:1px solid var(--border);padding-top:12px;}
  .notice-list-section h3{font-size:13px;color:var(--text-secondary);margin-bottom:10px;}
  .notice-item{background:var(--item-bg);border-radius:6px;padding:10px;margin-bottom:8px;border-left:4px solid var(--accent);position:relative;}
  .notice-meta{font-size:11px;color:var(--text-secondary);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .notice-meta .n-user{color:#fff;padding:1px 7px;border-radius:8px;font-size:11px;}
  .notice-text{font-size:13px;color:var(--text-base);white-space:pre-wrap;line-height:1.5;}
  .notice-del{position:absolute;top:8px;right:8px;background:#e74c3c;color:#fff;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px;}
  .notice-del:hover{background:#c0392b;}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-box" id="loginBox">
  <h1>💑 재현혜주네 캘린더</h1>
  <p>이름 입력 → 스킨 · 색상 선택 후 로그인하세요</p>
  <div class="quick-login" id="quickLoginSection">
    <h3>👤 사용자 선택 (클릭하면 자동 입력)</h3>
    <div class="quick-login-list" id="quickLoginList"></div>
  </div>
  <label for="nameInput">이름</label>
  <input type="text" id="nameInput" placeholder="예: 재현, 혜주" maxlength="20">
  <label>스킨 선택</label>
  <div class="skin-toggle">
    <div class="skin-btn active" id="skinLight">☀️ 라이트</div>
    <div class="skin-btn" id="skinDark">🌙 다크</div>
  </div>
  <label>색상 선택 (36가지)</label>
  <div class="color-palette" id="colorPalette"></div>
  <div class="selected-color-info">
    <span>선택한 색상:</span>
    <div class="selected-color-swatch" id="selectedSwatch" style="background:#bdc3c7"></div>
    <span id="selectedColorText">선택되지 않음</span>
  </div>
  <button class="login-btn" id="loginBtn" disabled>로그인</button>
</div>

<!-- 캘린더 화면 -->
<div class="container hidden" id="calendarBox">
  <div class="top-bar">
    <h1>💑 재현혜주네 캘린더</h1>
    <div class="user-info">
      <div class="user-dot" id="userDot"></div>
      <span id="userName"></span>
      <button class="skin-switch-btn" id="skinSwitchBtn"></button>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="top-bar">
    <button id="noticeBtn">📢 공지사항</button>
    <div class="nav">
      <button id="prevBtn">◀ 이전</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextBtn">다음 ▶</button>
      <button id="todayBtn">오늘</button>
    </div>
  </div>
  <div class="help-msg">💡 날짜를 <b>클릭</b>하면 단일 일정, <b>드래그</b>하면 기간 일정을 등록합니다.</div>
  <div id="importantBanner" class="important-banner hidden">
    <div class="b-title">⭐ 중요 일정</div>
    <div id="importantBannerList"></div>
  </div>
  <div class="weekdays">
    <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
  </div>
  <div class="days" id="daysGrid"></div>
  <div class="event-panel">
    <h2 id="selectedDateLabel">날짜를 선택하세요</h2>
    <div class="range-info" id="rangeInfo"></div>
    <div class="event-form">
      <input type="text" id="eventInput" placeholder="일정 내용을 입력하세요" disabled>
      <span class="time-label">시작</span>
      <input type="time" id="eventFrom" disabled>
      <span class="time-label">~ 종료</span>
      <input type="time" id="eventTo" disabled>
      <label class="important-check"><input type="checkbox" id="importantCheck" disabled> ⭐ 매우중요</label>
      <button id="addBtn" disabled>추가</button>
    </div>
    <ul class="event-list" id="eventList"></ul>
  </div>
</div>

<!-- 공지사항 모달 -->
<div class="modal-overlay hidden" id="noticeModal">
  <div class="modal-box">
    <h2>📢 공지사항</h2>
    <textarea id="noticeTextInput" placeholder="공지 내용을 입력하세요..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="noticeCloseBtn">닫기</button>
      <button class="modal-btn primary" id="noticeAddBtn">등록</button>
    </div>
    <div class="notice-list-section">
      <h3>등록된 공지</h3>
      <div id="noticeList"></div>
    </div>
  </div>
</div>

<script>
  const KEY_EVENTS  = 'hyeju_events';
  const KEY_USERS   = 'hyeju_users';
  const KEY_CURRENT = 'hyeju_current_user';
  const KEY_NOTICES = 'hyeju_notices';

  const COLOR_PALETTE = [
    '#fadbd8','#f5b7b1','#f1948a','#ec7063','#e74c3c','#c0392b',
    '#fdebd0','#fad7a0','#f8c471','#f5b041','#f39c12','#d68910',
    '#fcf3cf','#f9e79f','#f7dc6f','#f4d03f','#f1c40f','#b7950b',
    '#d4efdf','#a9dfbf','#7dcea0','#52be80','#27ae60','#1e8449',
    '#d6eaf8','#aed6f1','#85c1e9','#5dade2','#3498db','#2874a6',
    '#e8daef','#d2b4de','#bb8fce','#a569bd','#8e44ad','#6c3483'
  ];

  let currentDate=new Date(),selectedColor=null,selectedSkin='light';
  let currentUser=null,currentUserColor=null,currentUserSkin='light';
  let selectedStart=null,selectedEnd=null;
  let isDragging=false,dragStart=null,dragEnd=null;

  function applySkin(s){document.body.classList.toggle('dark',s==='dark');}

  function saveEvents(ev){localStorage.setItem(KEY_EVENTS,JSON.stringify(ev));}
  function loadEvents(){
    const raw=localStorage.getItem(KEY_EVENTS);if(!raw)return[];
    const p=JSON.parse(raw);
    if(!Array.isArray(p)){
      const m=[];
      Object.keys(p).forEach(d=>(p[d]||[]).forEach(ev=>m.push({id:makeId(),user:ev.user||'?',color:ev.color||'#95a5a6',text:ev.text||'',startDate:d,endDate:d,from:ev.from||'',to:ev.to||'',important:false})));
      saveEvents(m);return m;
    }
    return p;
  }
  function loadUsers(){
    const raw=localStorage.getItem(KEY_USERS);if(!raw)return{};
    const p=JSON.parse(raw);const r={};
    Object.keys(p).forEach(n=>{const v=p[n];r[n]=(typeof v==='string')?{color:v,skin:'light'}:v;});
    return r;
  }
  function saveUsers(u){localStorage.setItem(KEY_USERS,JSON.stringify(u));}
  function loadNotices(){const r=localStorage.getItem(KEY_NOTICES);return r?JSON.parse(r):[];}
  function saveNotices(a){localStorage.setItem(KEY_NOTICES,JSON.stringify(a));}

  function makeId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
  function formatDate(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  function todayStr(){const t=new Date();return formatDate(t.getFullYear(),t.getMonth(),t.getDate());}
  function formatTimeRange(f,t){return(f&&t)?`${f}~${t}`:f?`${f}~`:t?`~${t}`:''; }
  function minDate(a,b){return a<b?a:b;} function maxDate(a,b){return a>b?a:b;}
  function dateInRange(d,s,e){const lo=minDate(s,e),hi=maxDate(s,e);return d>=lo&&d<=hi;}
  function rangesOverlap(as,ae,bs,be){return as<=be&&bs<=ae;}
  function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}

  function renderColorPalette(){
    const el=document.getElementById('colorPalette');el.innerHTML='';
    COLOR_PALETTE.forEach(c=>{
      const cell=document.createElement('div');cell.className='color-cell';
      cell.style.background=c;cell.dataset.color=c;
      cell.addEventListener('click',()=>pickColor(c));el.appendChild(cell);
    });
  }
  function pickColor(c){
    selectedColor=c;
    document.querySelectorAll('.color-cell').forEach(el=>el.classList.toggle('active',el.dataset.color===c));
    document.getElementById('selectedSwatch').style.background=c;
    document.getElementById('selectedColorText').textContent=c;
    checkLoginReady();
  }
  document.getElementById('skinLight').addEventListener('click',()=>setLoginSkin('light'));
  document.getElementById('skinDark').addEventListener('click',()=>setLoginSkin('dark'));
  function setLoginSkin(s){
    selectedSkin=s;
    document.getElementById('skinLight').classList.toggle('active',s==='light');
    document.getElementById('skinDark').classList.toggle('active',s==='dark');
    applySkin(s);
  }
  function checkLoginReady(){
    document.getElementById('loginBtn').disabled=!(document.getElementById('nameInput').value.trim()&&selectedColor);
  }
  function loadAllUsers(){
    const parseRaw=raw=>{if(!raw)return{};const p=JSON.parse(raw);const r={};Object.keys(p).forEach(n=>{const v=p[n];r[n]=(typeof v==='string')?{color:v,skin:'light'}:v;});return r;};
    const merged={};
    Object.entries(parseRaw(localStorage.getItem(KEY_USERS))).forEach(([n,v])=>{merged[n]={...v,fromCurrent:true};});
    const adminRaw=localStorage.getItem('admin_calendars');const cals=adminRaw?JSON.parse(adminRaw):[];
    const otherKeys=['family_users','hyeju_users',...cals.filter(c=>!c.builtin).map(c=>`cal_${c.id}_users`)].filter(k=>k!==KEY_USERS);
    otherKeys.forEach(key=>{Object.entries(parseRaw(localStorage.getItem(key))).forEach(([n,v])=>{if(!merged[n])merged[n]={...v,fromCurrent:false};});});
    return merged;
  }
  function renderSavedUsers(){
    const users=loadAllUsers(),section=document.getElementById('quickLoginSection'),list=document.getElementById('quickLoginList');
    list.innerHTML='';const names=Object.keys(users);
    if(!names.length){section.style.display='none';return;}
    section.style.display='';
    const sorted=[...names].sort((a,b)=>(users[b].fromCurrent?1:0)-(users[a].fromCurrent?1:0));
    const hasCurrent=sorted.some(n=>users[n].fromCurrent);
    let otherShown=false;
    if(hasCurrent){const l=document.createElement('div');l.className='quick-login-label';l.textContent='이 캘린더';list.appendChild(l);}
    sorted.forEach(name=>{
      const u=users[name];
      if(!u.fromCurrent&&!otherShown){
        if(hasCurrent){const d=document.createElement('div');d.className='quick-login-divider';list.appendChild(d);}
        const l=document.createElement('div');l.className='quick-login-label';l.textContent='다른 캘린더';list.appendChild(l);otherShown=true;
      }
      const chip=document.createElement('div');chip.className='saved-user-chip'+(u.fromCurrent?'':' other-cal');
      const dot=document.createElement('span');dot.className='dot';dot.style.background=u.color;
      const lbl=document.createElement('span');lbl.textContent=name;
      const icon=document.createElement('span');icon.className='skin-icon';icon.textContent=u.skin==='dark'?'🌙':'☀️';
      chip.appendChild(dot);chip.appendChild(lbl);chip.appendChild(icon);
      chip.addEventListener('click',()=>{document.getElementById('nameInput').value=name;pickColor(u.color);setLoginSkin(u.skin||'light');login();});
      list.appendChild(chip);
    });
  }
  function login(){
    const name=document.getElementById('nameInput').value.trim();
    if(!name||!selectedColor)return;
    const users=loadUsers();const prev=users[name]?.color;
    users[name]={color:selectedColor,skin:selectedSkin};saveUsers(users);
    if(prev&&prev!==selectedColor){const ev=loadEvents();let ch=false;ev.forEach(e=>{if(e.user===name){e.color=selectedColor;ch=true;}});if(ch)saveEvents(ev);}
    localStorage.setItem(KEY_CURRENT,name);
    currentUser=name;currentUserColor=selectedColor;currentUserSkin=selectedSkin;
    showCalendar();
  }
  function logout(){
    localStorage.removeItem(KEY_CURRENT);
    currentUser=currentUserColor=null;currentUserSkin='light';
    selectedStart=selectedEnd=null;selectedColor=null;selectedSkin='light';
    document.getElementById('nameInput').value='';
    document.querySelectorAll('.color-cell').forEach(c=>c.classList.remove('active'));
    document.getElementById('selectedSwatch').style.background='#bdc3c7';
    document.getElementById('selectedColorText').textContent='선택되지 않음';
    document.getElementById('loginBtn').disabled=true;
    ['eventInput','eventFrom','eventTo'].forEach(id=>{const el=document.getElementById(id);el.disabled=true;el.value='';});
    document.getElementById('importantCheck').checked=false;document.getElementById('importantCheck').disabled=true;
    document.getElementById('addBtn').disabled=true;
    setLoginSkin('light');
    document.getElementById('loginBox').classList.remove('hidden');
    document.getElementById('calendarBox').classList.add('hidden');
    renderSavedUsers();
  }
  function showCalendar(){
    applySkin(currentUserSkin);
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('calendarBox').classList.remove('hidden');
    document.getElementById('userName').textContent=currentUser;
    document.getElementById('userDot').style.background=currentUserColor;
    updateSkinSwitchBtn();renderCalendar();renderEventList();
  }
  function updateSkinSwitchBtn(){
    document.getElementById('skinSwitchBtn').textContent=currentUserSkin==='dark'?'☀️ 라이트':'🌙 다크';
  }
  document.getElementById('skinSwitchBtn').addEventListener('click',()=>{
    currentUserSkin=currentUserSkin==='dark'?'light':'dark';
    applySkin(currentUserSkin);updateSkinSwitchBtn();
    const u=loadUsers();if(u[currentUser]){u[currentUser].skin=currentUserSkin;saveUsers(u);}
  });

  function renderImportantBanner(){
    const banner=document.getElementById('importantBanner');
    const list=document.getElementById('importantBannerList');
    const today=todayStr();
    const all=loadEvents().filter(ev=>ev.important&&ev.endDate>=today);
    const inProgressEvs=all.filter(ev=>ev.startDate<=today).sort((a,b)=>a.endDate.localeCompare(b.endDate));
    const upcomingEvs=all.filter(ev=>ev.startDate>today).sort((a,b)=>a.startDate.localeCompare(b.startDate));
    if(!all.length){banner.classList.add('hidden');return;}
    banner.classList.remove('hidden');list.innerHTML='';
    const makeItem=(ev,isIP)=>{
      const item=document.createElement('div');item.className='b-item'+(isIP?' in-progress':'');
      const badge=document.createElement('span');badge.className='b-user-badge';badge.style.background=ev.color||'#95a5a6';badge.textContent=ev.user;
      const ts=formatTimeRange(ev.from,ev.to);
      const text=document.createElement('span');text.textContent=`${ts?ts+' ':''}${ev.text}`;
      const range=document.createElement('span');range.className='b-range';
      range.textContent=ev.startDate===ev.endDate?ev.startDate:`${ev.startDate}~${ev.endDate}`;
      item.appendChild(badge);item.appendChild(text);item.appendChild(range);return item;
    };
    if(inProgressEvs.length){
      const t=document.createElement('div');t.className='b-section-title';t.textContent='📍 현재 일정 진행중';list.appendChild(t);
      inProgressEvs.forEach(ev=>list.appendChild(makeItem(ev,true)));
    }
    if(upcomingEvs.length){
      const t=document.createElement('div');t.className='b-section-title'+(inProgressEvs.length?' b-section-gap':'');t.textContent='📅 진행 예정 주요 일정';list.appendChild(t);
      upcomingEvs.forEach(ev=>list.appendChild(makeItem(ev,false)));
    }
  }

  function renderCalendar(){
    const year=currentDate.getFullYear(),month=currentDate.getMonth();
    document.getElementById('monthLabel').textContent=`${year}년 ${month+1}월`;
    const firstDay=new Date(year,month,1).getDay(),lastDate=new Date(year,month+1,0).getDate();
    const today=todayStr();
    const events=loadEvents(),grid=document.getElementById('daysGrid');
    grid.innerHTML='';
    for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='day empty';grid.appendChild(e);}
    const dragLo=(isDragging&&dragStart&&dragEnd)?minDate(dragStart,dragEnd):null;
    const dragHi=(isDragging&&dragStart&&dragEnd)?maxDate(dragStart,dragEnd):null;
    for(let day=1;day<=lastDate;day++){
      const cell=document.createElement('div');cell.className='day';
      const dateStr=formatDate(year,month,day);cell.dataset.date=dateStr;
      const wd=new Date(year,month,day).getDay();
      if(wd===0)cell.classList.add('sun');if(wd===6)cell.classList.add('sat');
      if(dateStr===today)cell.classList.add('today');
      if(isDragging&&dragLo){
        if(dateStr===dragLo||dateStr===dragHi)cell.classList.add('range-edge');
        else if(dateStr>dragLo&&dateStr<dragHi)cell.classList.add('range');
      }else if(selectedStart&&selectedEnd){
        const lo=minDate(selectedStart,selectedEnd),hi=maxDate(selectedStart,selectedEnd);
        if(selectedStart===selectedEnd&&dateStr===selectedStart)cell.classList.add('selected');
        else if(dateStr===lo||dateStr===hi)cell.classList.add('range-edge');
        else if(dateStr>lo&&dateStr<hi)cell.classList.add('range');
      }
      const num=document.createElement('div');num.className='date-num';num.textContent=day;cell.appendChild(num);
      const dayEvs=events.filter(ev=>dateInRange(dateStr,ev.startDate,ev.endDate));
      const seen=new Set();
      const deduped=dayEvs.filter(ev=>{
        const k=`${ev.startDate}|${ev.endDate}|${ev.text}`;
        if(seen.has(k))return false;seen.add(k);return true;
      });
      deduped.slice(0,2).forEach(ev=>{
        const isMulti=ev.startDate!==ev.endDate;
        let barClass;
        if(!isMulti){barClass='bar-single';}
        else{
          const isFirst=dateStr===ev.startDate||wd===0;
          const isLast=dateStr===ev.endDate||wd===6;
          if(isFirst&&isLast)barClass='bar-span';
          else if(isFirst)barClass='bar-start';
          else if(isLast)barClass='bar-end';
          else barClass='bar-mid';
        }
        const bar=document.createElement('div');
        bar.className=`event-bar ${barClass}`;
        bar.style.background=ev.color||'#95a5a6';
        if(barClass==='bar-single'||barClass==='bar-start'||barClass==='bar-span'){
          const ts=formatTimeRange(ev.from,ev.to);
          bar.textContent=`${ev.important?'⭐ ':''}${ev.user}: ${ts?ts+' ':''}${ev.text}`;
        }
        cell.appendChild(bar);
      });
      if(deduped.length>2){
        const more=document.createElement('div');more.className='event-bar bar-single';
        more.style.background='#95a5a6';more.textContent=`+${deduped.length-2}개 더`;cell.appendChild(more);
      }
      cell.addEventListener('mousedown',e=>{e.preventDefault();isDragging=true;dragStart=dateStr;dragEnd=dateStr;renderCalendar();});
      cell.addEventListener('mouseenter',()=>{if(!isDragging)return;dragEnd=dateStr;renderCalendar();});
      grid.appendChild(cell);
    }
    renderImportantBanner();
  }

  document.addEventListener('mouseup',()=>{
    if(!isDragging)return;isDragging=false;
    if(dragStart&&dragEnd){selectedStart=minDate(dragStart,dragEnd);selectedEnd=maxDate(dragStart,dragEnd);activateInputs();updateSelectedLabel();}
    dragStart=dragEnd=null;renderCalendar();renderEventList();
  });

  function activateInputs(){
    ['eventInput','eventFrom','eventTo','importantCheck'].forEach(id=>document.getElementById(id).disabled=false);
    document.getElementById('addBtn').disabled=false;
  }
  function updateSelectedLabel(){
    const label=document.getElementById('selectedDateLabel'),info=document.getElementById('rangeInfo');
    if(!selectedStart){label.textContent='날짜를 선택하세요';info.textContent='';return;}
    if(selectedStart===selectedEnd){label.textContent=`${selectedStart} 일정`;info.textContent='단일 날짜 선택됨';}
    else{label.textContent=`${selectedStart} ~ ${selectedEnd} 기간 일정`;info.textContent=`총 ${daysBetween(selectedStart,selectedEnd)+1}일 기간 선택됨`;}
  }
  function renderEventList(){
    const list=document.getElementById('eventList');list.innerHTML='';
    if(!selectedStart)return;
    const events=loadEvents();
    const matched=events.filter(ev=>rangesOverlap(ev.startDate,ev.endDate,selectedStart,selectedEnd))
      .sort((a,b)=>{if(a.startDate!==b.startDate)return a.startDate.localeCompare(b.startDate);return(a.from||'99:99').localeCompare(b.from||'99:99');});
    if(!matched.length){const m=document.createElement('li');m.className='empty-msg';m.textContent='등록된 일정이 없습니다.';list.appendChild(m);return;}
    matched.forEach(ev=>{
      const li=document.createElement('li');li.style.borderLeftColor=ev.color||'#95a5a6';
      const content=document.createElement('div');content.className='event-content';
      if(ev.important){const imp=document.createElement('span');imp.className='event-important-badge';imp.textContent='⭐중요';content.appendChild(imp);}
      const badge=document.createElement('span');badge.className='event-user';badge.style.background=ev.color||'#95a5a6';badge.textContent=ev.user;content.appendChild(badge);
      if(ev.startDate!==ev.endDate){const rb=document.createElement('span');rb.className='event-range';rb.textContent=`📅 ${ev.startDate} ~ ${ev.endDate}`;content.appendChild(rb);}
      const ts=formatTimeRange(ev.from,ev.to);
      if(ts){const tb=document.createElement('span');tb.className='event-time';tb.textContent=`⏰ ${ts}`;content.appendChild(tb);}
      const tx=document.createElement('span');tx.className='event-text';tx.textContent=ev.text;content.appendChild(tx);
      const btn=document.createElement('button');btn.className='delete-btn';btn.textContent='삭제';
      btn.addEventListener('click',()=>deleteEvent(ev.id));
      li.appendChild(content);li.appendChild(btn);list.appendChild(li);
    });
  }
  function addEvent(){
    const input=document.getElementById('eventInput'),text=input.value.trim();
    if(!text||!selectedStart||!selectedEnd)return;
    const from=document.getElementById('eventFrom').value,to=document.getElementById('eventTo').value;
    const important=document.getElementById('importantCheck').checked;
    if(selectedStart===selectedEnd&&from&&to&&to<from){alert('종료 시간이 시작 시간보다 빠를 수 없습니다.');return;}
    const events=loadEvents();
    events.push({id:makeId(),user:currentUser,color:currentUserColor,text,startDate:selectedStart,endDate:selectedEnd,from,to,important});
    saveEvents(events);
    input.value='';document.getElementById('eventFrom').value='';document.getElementById('eventTo').value='';
    document.getElementById('importantCheck').checked=false;
    renderCalendar();renderEventList();
  }
  function deleteEvent(id){
    const events=loadEvents(),target=events.find(ev=>ev.id===id);if(!target)return;
    const who=target.user!==currentUser?`[${target.user}]님이 등록한 `:'';
    if(!confirm(`${who}"${target.text}" 일정을 삭제하시겠습니까?`))return;
    saveEvents(events.filter(ev=>ev.id!==id));renderCalendar();renderEventList();
  }

  function openNoticeModal(){renderNoticeList();document.getElementById('noticeModal').classList.remove('hidden');}
  function closeNoticeModal(){document.getElementById('noticeModal').classList.add('hidden');document.getElementById('noticeTextInput').value='';}
  function addNotice(){
    const text=document.getElementById('noticeTextInput').value.trim();if(!text)return;
    const now=new Date();const pad=n=>String(n).padStart(2,'0');
    const createdAt=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const notices=loadNotices();
    notices.unshift({id:makeId(),user:currentUser,color:currentUserColor,text,createdAt});
    saveNotices(notices);document.getElementById('noticeTextInput').value='';renderNoticeList();
  }
  function deleteNotice(id){
    if(!confirm('이 공지를 삭제하시겠습니까?'))return;
    saveNotices(loadNotices().filter(n=>n.id!==id));renderNoticeList();
  }
  function renderNoticeList(){
    const listEl=document.getElementById('noticeList');listEl.innerHTML='';
    const notices=loadNotices();
    if(!notices.length){listEl.innerHTML='<p style="color:var(--empty-msg);font-size:13px;padding:8px 0">등록된 공지가 없습니다.</p>';return;}
    notices.forEach(n=>{
      const item=document.createElement('div');item.className='notice-item';item.style.borderLeftColor=n.color||'var(--accent)';
      const del=document.createElement('button');del.className='notice-del';del.textContent='삭제';del.addEventListener('click',()=>deleteNotice(n.id));
      const meta=document.createElement('div');meta.className='notice-meta';
      const uSpan=document.createElement('span');uSpan.className='n-user';uSpan.style.background=n.color||'#95a5a6';uSpan.textContent=n.user;
      meta.appendChild(uSpan);meta.appendChild(document.createTextNode(` · ${n.createdAt}`));
      const text=document.createElement('div');text.className='notice-text';text.textContent=n.text;
      item.appendChild(del);item.appendChild(meta);item.appendChild(text);listEl.appendChild(item);
    });
  }

  document.getElementById('nameInput').addEventListener('input',checkLoginReady);
  document.getElementById('loginBtn').addEventListener('click',login);
  document.getElementById('nameInput').addEventListener('keypress',e=>{if(e.key==='Enter'&&!document.getElementById('loginBtn').disabled)login();});
  document.getElementById('logoutBtn').addEventListener('click',logout);
  document.getElementById('prevBtn').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()-1);renderCalendar();});
  document.getElementById('nextBtn').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()+1);renderCalendar();});
  document.getElementById('todayBtn').addEventListener('click',()=>{currentDate=new Date();renderCalendar();});
  document.getElementById('addBtn').addEventListener('click',addEvent);
  document.getElementById('noticeBtn').addEventListener('click',openNoticeModal);
  document.getElementById('noticeCloseBtn').addEventListener('click',closeNoticeModal);
  document.getElementById('noticeAddBtn').addEventListener('click',addNotice);
  document.getElementById('noticeModal').addEventListener('click',e=>{if(e.target===document.getElementById('noticeModal'))closeNoticeModal();});
  ['eventInput','eventFrom','eventTo'].forEach(id=>document.getElementById(id).addEventListener('keypress',e=>{if(e.key==='Enter')addEvent();}));

  renderColorPalette();
  renderSavedUsers();
  const savedName=localStorage.getItem(KEY_CURRENT);
  if(savedName){const u=loadUsers()[savedName];if(u){currentUser=savedName;currentUserColor=u.color;currentUserSkin=u.skin||'light';selectedColor=u.color;selectedSkin=u.skin||'light';showCalendar();}}
</script>
</body>
</html>
